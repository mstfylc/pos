services:
  postgres:
    image: postgres:16
    container_name: mansis-pos-postgres
    environment:
      POSTGRES_DB: mansis_pos
      POSTGRES_USER: mansis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - mansis_pos_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mansis -d mansis_pos"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mansis_pos_postgres:

services:
  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      DB_CONNECTION_STRING: ${DB_CONNECTION_STRING:?set DB_CONNECTION_STRING}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?set CORS_ALLOWED_ORIGINS}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:?set SUPERADMIN_EMAIL}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:?set SUPERADMIN_PASSWORD}
      COMPANY_ID: ${COMPANY_ID:?set COMPANY_ID}
      AUTO_MIGRATE: ${AUTO_MIGRATE:-false}
      SEED_DATABASE: ${SEED_DATABASE:-false}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: mansis_pos
      POSTGRES_USER: mansis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - mansis_pos_prod_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mansis -d mansis_pos"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  mansis_pos_prod_postgres:

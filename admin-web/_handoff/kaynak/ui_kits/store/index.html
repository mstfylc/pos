<!-- @startingPoint section="Store & Loyalty" subtitle="Uyanık storefront — shop, product, checkout & account" viewport="1280x900" -->
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Uyanık — Mağaza</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{height:100%;}
  body{margin:0;background:var(--surface-page);}
  #app{min-height:100vh;}
</style>
</head>
<body>
<div id="app"></div>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" rx="14" fill="#1F3864"/>
    <path d="M32 36 H70 L66 58 H38 Z" fill="none" stroke="#E08A2B" stroke-width="3.5" stroke-linejoin="round"/>
    <circle cx="42" cy="68" r="4" fill="#E08A2B"/><circle cx="62" cy="68" r="4" fill="#E08A2B"/>
    <path d="M26 32 H32" stroke="#E08A2B" stroke-width="3.5" stroke-linecap="round"/>
  </svg>
</template>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="StoreShell.jsx"></script>
<script type="text/babel" src="StorefrontView.jsx"></script>
<script type="text/babel" src="ProductView.jsx"></script>
<script type="text/babel" src="CheckoutView.jsx"></script>
<script type="text/babel" src="AccountView.jsx"></script>
<script type="text/babel">
  function App(){
    const [view,setView]=React.useState('store');
    const [cart,setCart]=React.useState([]);
    const [sel,setSel]=React.useState(null);
    const points=2480;
    const cartCount=cart.reduce((s,p)=>s+p.qty,0);
    const addToCart=(p)=>setCart(prev=>{const e=prev.find(x=>x.id===p.id); if(e) return prev.map(x=>x.id===p.id?{...x,qty:x.qty+1}:x); return [...prev,{...p,qty:1}];});
    const inc=(p)=>setCart(prev=>prev.map(x=>x.id===p.id?{...x,qty:x.qty+1}:x));
    const dec=(p)=>setCart(prev=>prev.flatMap(x=>x.id===p.id?(x.qty>1?[{...x,qty:x.qty-1}]:[]):[x]));
    const remove=(p)=>setCart(prev=>prev.filter(x=>x.id!==p.id));
    const open=(p)=>{setSel(p);setView('product');window.scrollTo(0,0);};
    const nav=(v)=>{setView(v);window.scrollTo(0,0);};
    let content;
    if(view==='store') content=<window.StorefrontView onOpen={open} onAdd={addToCart}/>;
    else if(view==='product') content=<window.ProductView product={sel} onAdd={(p)=>{addToCart(p);nav('checkout');}} onBack={()=>nav('store')}/>;
    else if(view==='checkout') content=<window.CheckoutView cart={cart} onInc={inc} onDec={dec} onRemove={remove} onPlace={()=>nav('done')} onBack={()=>nav('store')}/>;
    else if(view==='done') content=<window.OrderDone onBack={()=>{setCart([]);nav('store');}}/>;
    else content=<window.AccountView/>;
    return <window.StoreShell active={view} onNav={nav} cartCount={cartCount} points={points}>{content}</window.StoreShell>;
  }
  ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>

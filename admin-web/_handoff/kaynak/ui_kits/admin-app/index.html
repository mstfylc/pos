<!-- @startingPoint section="Kütüphane Paneli" subtitle="Uyanık yönetim paneli — çok ekranlı uygulama" viewport="1440x980" -->
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Uyanık — Yönetim Paneli</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html,body{height:100%;}
  body{margin:0;background:var(--surface-page);}
  #app{min-height:100vh;}
  .ph-soon{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;padding:54px 0 30px;text-align:center;}
  .ph-soon__ic{width:62px;height:62px;border-radius:16px;background:var(--color-primary-soft);display:flex;align-items:center;justify-content:center;margin-bottom:6px;}
  .ph-soon__t{font:var(--fw-bold) 18px/1.2 var(--font-sans);color:var(--text-heading);letter-spacing:var(--ls-tight);}
  .ph-soon__s{font:var(--fw-regular) 13px/1.5 var(--font-sans);color:var(--text-muted);max-width:420px;}
  .ph-soon__badge{display:inline-flex;align-items:center;gap:6px;font:var(--fw-semibold) 11px/1 var(--font-sans);text-transform:uppercase;letter-spacing:.05em;color:var(--color-primary);background:var(--color-primary-soft);padding:6px 11px;border-radius:999px;margin-bottom:4px;}
  .ph-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:760px;margin:18px auto 0;}
  @media(max-width:820px){.ph-grid{grid-template-columns:1fr 1fr;}}
  .ph-card{display:flex;align-items:center;gap:12px;text-align:left;background:var(--surface-card);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:14px 16px;cursor:pointer;transition:all .14s;appearance:none;}
  .ph-card:hover{border-color:var(--color-primary);box-shadow:var(--shadow-md);transform:translateY(-1px);}
  .ph-card__ic{width:38px;height:38px;border-radius:10px;background:var(--color-grey-100);display:flex;align-items:center;justify-content:center;flex:none;}
  .ph-card__t b{font:var(--fw-semibold) 13px/1.2 var(--font-sans);color:var(--text-heading);display:block;}
  .ph-card__t span{font:var(--fw-regular) 11.5px/1.3 var(--font-sans);color:var(--text-muted);display:block;margin-top:2px;}
  .ph-divider{display:flex;align-items:center;gap:12px;max-width:760px;margin:30px auto 4px;color:var(--text-placeholder);font:var(--fw-semibold) 10.5px/1 var(--font-sans);text-transform:uppercase;letter-spacing:.07em;}
  .ph-divider::before,.ph-divider::after{content:"";height:1px;background:var(--border-default);flex:1;}
</style>
</head>
<body>
<div id="app"></div>
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" rx="14" fill="#1F3864"/>
    <rect x="30" y="30" width="40" height="26" rx="5" fill="#E08A2B"/>
    <circle cx="42" cy="42" r="4" fill="#1F3864"/><circle cx="58" cy="42" r="4" fill="#1F3864"/>
    <path d="M46 52 L50 56 L54 52" stroke="#1F3864" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="../shared/logo.js"></script>
<script type="text/babel" src="../shared/ds-runtime.jsx"></script>
<script type="text/babel" src="StatePreview.jsx"></script>
<script type="text/babel" src="AdminShell.jsx"></script>
<script type="text/babel" src="../library/LibraryDashboard.jsx"></script>
<script type="text/babel" src="ProductForm.jsx"></script>
<script type="text/babel" src="ProductsView.jsx"></script>
<script type="text/babel" src="OrdersView.jsx"></script>
<script type="text/babel" src="CustomersView.jsx"></script>
<script type="text/babel" src="CategoriesView.jsx"></script>
<script type="text/babel" src="TransferView.jsx"></script>
<script type="text/babel" src="PurchaseView.jsx"></script>
<script type="text/babel" src="UsersView.jsx"></script>
<script type="text/babel" src="RolesView.jsx"></script>
<script type="text/babel" src="CampaignsView.jsx"></script>
<script type="text/babel" src="ReportBuilder.jsx"></script>
<script type="text/babel" src="ReportsView.jsx"></script>
<script type="text/babel" src="SettingsView.jsx"></script>
<script type="text/babel" src="CompanyView.jsx"></script>
<script type="text/babel" src="StockView.jsx"></script>
<script type="text/babel" src="LoyaltyView.jsx"></script>
<script type="text/babel">
const M = window.MetronicDesignSystem_a73f8f;
const { AdminShell, PageHeader } = window.AdminKit;
const { ToastProvider } = M;

const TITLES = {
  home:"Ana Sayfa", orders:"Siparişler", products:"Ürünler", categories:"Kategoriler", stock:"Stok / Depo",
  transfer:"Stok Transferi", purchase:"Satın Alma", customers:"Müşteriler", campaigns:"İndirim & Kampanya",
  loyalty:"Sadakat", users:"Kullanıcılar", roles:"Roller & Yetkiler", company:"Şirket / Şube / POS",
  reports:"Raporlar", settings:"Ayarlar",
};

const RANGES = [
  { id:"today", label:"Bugün", desc:"7 Haziran 2026, Pazar" },
  { id:"yesterday", label:"Dün", desc:"6 Haziran 2026, Cumartesi" },
  { id:"7d", label:"Son 7 gün", desc:"1 – 7 Haziran 2026" },
  { id:"30d", label:"Son 30 gün", desc:"9 Mayıs – 7 Haziran 2026" },
  { id:"month", label:"Bu ay", desc:"Haziran 2026" },
  { id:"custom", label:"Özel aralık…", desc:"Tarih aralığı seç" },
];

function DateRangePicker({ value, onChange }){
  const [open,setOpen]=React.useState(false);
  const ref=React.useRef(null);
  React.useEffect(()=>{
    function h(e){ if(ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown',h); return ()=>document.removeEventListener('mousedown',h);
  },[]);
  const cur=RANGES.find(r=>r.id===value)||RANGES[0];
  return (
    <div ref={ref} style={{position:"relative"}}>
      <M.Button variant="outline" color="dark" iconStart="calendar" iconEnd={open?"chevron-up":"chevron-down"} onClick={()=>setOpen(o=>!o)}>{cur.label}</M.Button>
      {open && (
        <div className="as-menu as-menu--right" style={{minWidth:228,top:"calc(100% + 8px)"}}>
          {RANGES.map(r=>(
            <button key={r.id} className={"as-menu__item"+(r.id===value?" as-menu__item--active":"")} onClick={()=>{onChange(r.id);setOpen(false);}}>
              <M.Icon name={r.id==="custom"?"calendar":"check-circle"} size={16} color={r.id===value?"var(--color-primary)":"var(--text-placeholder)"} style={{opacity:r.id===value||r.id==="custom"?1:0}}/>
              <span>{r.label}<small>{r.desc}</small></span>
              {r.id===value && <M.Icon name="check-circle" size={15} color="var(--color-primary)" style={{marginLeft:"auto"}}/>}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function HomeView(){
  const [range,setRange]=React.useState("today");
  const cur=RANGES.find(r=>r.id===range)||RANGES[0];
  const toast=M.ToastProvider.useToast();
  return (
    <React.Fragment>
      <PageHeader crumb={["Genel","Ana Sayfa"]} title="Genel Bakış"
        desc={`Çayyolu Şubesi'nin performansı · ${cur.label} (${cur.desc})`}
        actions={<>
          <DateRangePicker value={range} onChange={setRange}/>
          <M.Button color="accent" iconStart="handcart" onClick={()=>toast({type:"info",title:"POS uygulaması",description:"POS ayrı bir uygulamada (dokunmatik kasa) açılır."})}>POS'u Aç</M.Button>
        </>}/>
      <window.LibraryDashboard range={range} onNavigate={window.__adminNav}/>
    </React.Fragment>
  );
}

const READY = [
  { id:"home", label:"Ana Sayfa", icon:"home", desc:"Genel bakış panosu" },
  { id:"orders", label:"Siparişler", icon:"handcart", desc:"Liste + detay" },
  { id:"products", label:"Ürünler", icon:"notepad-bookmark", desc:"Katalog yönetimi" },
  { id:"stock", label:"Stok / Depo", icon:"folder", desc:"Stok + hareketler" },
  { id:"customers", label:"Müşteriler", icon:"people", desc:"Profil + sadakat" },
  { id:"loyalty", label:"Sadakat", icon:"heart", desc:"Seviye + ödül" },
];
const SOON_DETAIL = {
  categories:"Kategori ağacı, sürükle-bırak sıralama ve ürün sayıları.",
  transfer:"Şubeler arası stok transfer talepleri ve onay akışı.",
  purchase:"Tedarikçi siparişleri, irsaliye ve mal kabul.",
  campaigns:"İndirim kuralları, kupon ve kampanya zamanlayıcısı.",
  users:"Personel hesapları, şube ataması ve durum yönetimi.",
  roles:"Rol tanımları ve ekran bazında yetki matrisi.",
  company:"Şirket bilgileri, şube ve POS cihaz yönetimi.",
  reports:"Satış, stok ve sadakat raporları + dışa aktarım.",
  settings:"Vergi, para birimi, fiş şablonu ve genel ayarlar.",
};

function SoonView({ id, onNavigate }){
  return (
    <React.Fragment>
      <PageHeader crumb={["Sayfalar",TITLES[id]]} title={TITLES[id]}/>
      <div className="ph-soon">
        <span className="ph-soon__badge"><M.Icon name="rocket" size={12} color="var(--color-primary)"/>Geliştiriliyor</span>
        <div className="ph-soon__t">{TITLES[id]}</div>
        <div className="ph-soon__s">{SOON_DETAIL[id]||"Bu ekran öncelik sırasına göre eklenecek."} Bu modül yapım aşamasında — aşağıdaki hazır ekranlardan birine geçebilirsin.</div>
      </div>
      <div className="ph-divider">Hazır ekranlar</div>
      <div className="ph-grid">
        {READY.map(r=>(
          <button className="ph-card" key={r.id} onClick={()=>onNavigate(r.id)}>
            <span className="ph-card__ic"><M.Icon name={r.icon} size={18} color="var(--color-primary)"/></span>
            <span className="ph-card__t"><b>{r.label}</b><span>{r.desc}</span></span>
          </button>
        ))}
      </div>
    </React.Fragment>
  );
}

function App(){
  const [view,setView]=React.useState("home");
  React.useEffect(()=>{ window.__adminNav=setView; window.__adminLogout=()=>{ window.location.href="login.html"; }; },[]);
  let content;
  if(view==="home") content=<HomeView/>;
  else if(view==="products") content=<window.ProductsView/>;
  else if(view==="orders") content=<window.OrdersView/>;
  else if(view==="customers") content=<window.CustomersView/>;
  else if(view==="stock") content=<window.StockView/>;
  else if(view==="loyalty") content=<window.LoyaltyView/>;
  else if(view==="categories") content=<window.CategoriesView/>;
  else if(view==="transfer") content=<window.TransferView/>;
  else if(view==="purchase") content=<window.PurchaseView/>;
  else if(view==="users") content=<window.UsersView/>;
  else if(view==="roles") content=<window.RolesView/>;
  else if(view==="campaigns") content=<window.CampaignsView/>;
  else if(view==="reports") content=<window.ReportsView/>;
  else if(view==="settings") content=<window.SettingsView/>;
  else if(view==="company") content=<window.CompanyView/>;
  else content=<SoonView id={view} onNavigate={setView}/>;
  return (
    <ToastProvider>
      <AdminShell active={view} onNavigate={setView}>{content}</AdminShell>
    </ToastProvider>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>

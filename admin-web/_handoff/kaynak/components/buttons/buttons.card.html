<!-- @dsCard group="Components" viewport="700x340" name="Buttons" subtitle="Solid · Light · Outline · Ghost — colors, sizes, icons" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); }
  #root { display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .lbl { width: 58px; flex: none; font: var(--fw-semibold) 10px/1 var(--font-sans); color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, IconButton } = window.MetronicDesignSystem_a73f8f;
  function Demo(){
    const R = ({label,children}) => (<div className="row"><span className="lbl">{label}</span>{children}</div>);
    return (
      <React.Fragment>
        <R label="Solid">
          <Button color="accent" iconStart="handcart">Sepete ekle</Button>
          <Button color="primary" iconStart="plus-squared">New project</Button>
          <Button color="success">Approve</Button>
          <Button color="danger">Delete</Button>
          <Button color="dark">Dark</Button>
          <Button color="secondary">Secondary</Button>
        </R>
        <R label="Light">
          <Button variant="light" color="primary" iconStart="rocket">Upgrade</Button>
          <Button variant="light" color="success" iconStart="check-circle">Active</Button>
          <Button variant="light" color="danger">Remove</Button>
          <Button variant="light" color="info">Info</Button>
        </R>
        <R label="Outline">
          <Button variant="outline" color="primary">Default</Button>
          <Button variant="outline" color="dark">Dark</Button>
          <Button variant="outline" color="danger">Danger</Button>
          <Button variant="ghost" iconEnd="chevron-down">Filters</Button>
          <Button variant="link">Learn more</Button>
        </R>
        <R label="Sizes">
          <Button size="sm" color="primary">Small</Button>
          <Button size="md" color="primary">Medium</Button>
          <Button size="lg" color="primary">Large</Button>
          <Button color="primary" disabled>Disabled</Button>
        </R>
        <R label="Icon">
          <IconButton icon="magnifier" aria-label="Search" />
          <IconButton icon="setting-2" aria-label="Settings" />
          <IconButton icon="trash" variant="light" color="danger" aria-label="Delete" />
          <IconButton icon="plus-squared" variant="solid" color="primary" aria-label="Add" />
          <IconButton icon="more" variant="ghost" aria-label="More" />
          <IconButton icon="heart" variant="light" color="primary" rounded aria-label="Like" />
        </R>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>

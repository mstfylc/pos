openapi: 3.0.3
info:
  title: Mansis POS v2 API
  version: 0.1.0
  description: Backend contract source for generated web and mobile clients.
servers:
  - url: https://api.example.com
    description: Production placeholder
  - url: http://localhost:5000
    description: Local development
tags:
  - name: Auth
  - name: Admin
  - name: App
  - name: Loyalty
  - name: Stock
paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Access and refresh token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResult'
        default:
          $ref: '#/components/responses/Problem'
  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: refresh
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Rotated access and refresh token pair
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResult'
        default:
          $ref: '#/components/responses/Problem'
  /api/v1/auth/otp/request:
    post:
      tags: [Auth]
      operationId: requestOtp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpRequest'
      responses:
        '200':
          description: OTP request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpResult'
        default:
          $ref: '#/components/responses/Problem'
  /api/v1/auth/otp/verify:
    post:
      tags: [Auth]
      operationId: verifyOtp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerifyRequest'
      responses:
        '200':
          description: OTP verification accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpResult'
        default:
          $ref: '#/components/responses/Problem'
  /api/v1/admin/companies:
    get:
      tags: [Admin]
      operationId: listAdminCompanies
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Company list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Company'
        default:
          $ref: '#/components/responses/Problem'
  /api/v1/admin/products:
    get:
      tags: [Admin]
      operationId: listAdminProducts
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/CompanyId'
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        default:
          $ref: '#/components/responses/Problem'
    post:
      tags: [Admin]
      operationId: createAdminProduct
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductWrite'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        default:
          $ref: '#/components/responses/Problem'
  /api/v1/admin/products/{id}:
    put:
      tags: [Admin]
      operationId: updateAdminProduct
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductWrite'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        default:
          $ref: '#/components/responses/Problem'
    delete:
      tags: [Admin]
      operationId: deleteAdminProduct
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/CompanyId'
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: Product deactivated
        default:
          $ref: '#/components/responses/Problem'
  /api/v1/admin/pos-products:
    post:
      tags: [Admin]
      operationId: createAdminPosProduct
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PosProductWrite'
      responses:
        '201':
          description: POS product price override created
          content:

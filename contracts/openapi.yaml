components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    CompanyId:
      name: companyId
      in: query
      required: true
      schema:
        type: string
        format: uuid
    CustomerId:
      name: customerId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OrderId:
      name: orderId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        minLength: 8
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: userId
      in: query
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Problem:
      description: ProblemDetails error response
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
  schemas:
    ProblemDetails:
      type: object
      properties:
        type: { type: string, nullable: true }
        title: { type: string, nullable: true }
        status: { type: integer, nullable: true }
        detail: { type: string, nullable: true }
        instance: { type: string, nullable: true }
      additionalProperties: true
    LoginRequest:
      type: object
      required: [companyId, username, password]
      properties:
        companyId: { type: string, format: uuid }
        username: { type: string }
        password: { type: string, format: password }
    RefreshTokenRequest:
      type: object
      required: [companyId, refreshToken]
      properties:
        companyId: { type: string, format: uuid }
        refreshToken: { type: string }
    AuthTokenResult:
      type: object
      required: [userId, companyId, accessToken, refreshToken, expiresAt, mustChangePassword]
      properties:
        userId: { type: string, format: uuid }
        companyId: { type: string, format: uuid }
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresAt: { type: string, format: date-time }
        mustChangePassword: { type: boolean }
    OtpRequest:
      type: object
      required: [companyId, phone]
      properties:
        companyId: { type: string, format: uuid }
        phone: { type: string }
    OtpVerifyRequest:
      type: object
      required: [companyId, phone, code]
      properties:
        companyId: { type: string, format: uuid }
        phone: { type: string }
        code: { type: string }
    OtpResult:
      type: object
      required: [state]
      properties:
        state: { type: string }
    Company:
      type: object
      required: [id, name, active]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        active: { type: boolean }
    Product:
      type: object
      required: [id, companyId, name, categoryId, productUnitType, taxType, stocktaking, storeProduct, posProduct, entryProduct, favoriteProduct, sortOrder, main, active]
      properties:
        id: { type: string, format: uuid }
        companyId: { type: string, format: uuid }
        name: { type: string }
        categoryId: { type: string, format: uuid }
        purchasePrice: { type: string, format: decimal, nullable: true }
        salePrice: { type: string, format: decimal, nullable: true }
        barcode: { type: string, nullable: true }
        stockCode: { type: string, nullable: true }
        productUnitType: { $ref: '#/components/schemas/ProductUnitType' }
        taxType: { $ref: '#/components/schemas/TaxType' }
        stocktaking: { type: boolean }
        image: { type: string, nullable: true }
        storeProduct: { type: boolean }
        posProduct: { type: boolean }
        entryProduct: { type: boolean }
        favoriteProduct: { type: boolean }
        sortOrder: { type: integer }
        description: { type: string, nullable: true }
        main: { type: boolean }
        parentId: { type: string, format: uuid, nullable: true }
        active: { type: boolean }
    ProductWrite:
